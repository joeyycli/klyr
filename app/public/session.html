<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>klyr</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- xterm.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
</head>
<body class="session-page">
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="/" class="topbar-brand">
        <div class="logo-icon">
          <div style="width:8px;height:8px;border-radius:50%;border:1px solid hsl(0 0% 100%/0.6)"></div>
        </div>
        <span class="logo-text">klyr</span>
      </a>
      <div class="topbar-divider"></div>
      <span class="session-id" id="sessionIdLabel">---</span>
    </div>
    <div class="topbar-center">
      <div class="topbar-tabs">
        <button class="topbar-tab active" data-panel="terminal">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          Terminal
        </button>
        <button class="topbar-tab" data-panel="code">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18 22 12 16 6"/><path d="M8 6 2 12 8 18"/></svg>
          Code
        </button>
        <button class="topbar-tab" data-panel="preview">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
          Preview
        </button>
      </div>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn active" id="toggleFilesBtn" title="Toggle files">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="topbar-btn" id="togglePreviewBtn" title="Toggle preview split">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
      </button>
    </div>
  </header>

  <!-- Workspace -->
  <div class="workspace">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span>Files</span>
        <button class="sidebar-btn" id="refreshFilesBtn" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
        </button>
      </div>
      <div class="file-tree" id="fileTree">
        <div class="file-tree-empty">No files yet</div>
      </div>
    </aside>

    <div class="resize-handle" id="sidebarResize"></div>

    <!-- Main -->
    <div class="main-content">
      <div class="panel terminal-panel active" id="terminalPanel">
        <div id="terminal"></div>
      </div>
      <div class="panel code-panel" id="codePanel">
        <div class="code-header" id="codeHeader">Select a file</div>
        <pre class="code-content" id="codeContent"><code></code></pre>
      </div>
      <div class="panel preview-panel" id="previewPanel">
        <div class="preview-toolbar">
          <div class="preview-url" id="previewUrl">Preview</div>
          <button class="preview-btn" id="refreshPreviewBtn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          </button>
          <button class="preview-btn" id="openPreviewBtn" title="Open in new tab">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
        <div class="preview-frame-container">
          <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
          <div class="preview-placeholder" id="previewPlaceholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
            <p>Preview will appear here</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/session.js"></script>
</body>
</html>
